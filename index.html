<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fin360° — Organização Financeira</title>
<link rel="icon" type="image/png" href="assets/img/emblema.png" />
<link rel="apple-touch-icon" href="assets/img/emblema-tile.png" />
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="auth-screen" id="auth-screen" style="display:none"></div>

  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <img class="brand-logo-img" src="assets/img/logo.png" alt="Fin360°" />
          <img class="brand-logo-mini" src="assets/img/emblema-tile.png" alt="Fin360°" />
        </div>
        <button class="collapse-btn" id="collapse-btn" title="Recolher menu">‹</button>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-footer">
        <div class="sidebar-version">Fin360° · protótipo v0.1</div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" id="menu-btn" title="Menu"></button>
          <div>
            <h1 id="page-title">Dashboard</h1>
            <p id="page-subtitle">Visão geral</p>
          </div>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" id="theme-btn" title="Alternar tema"></button>
          <button class="icon-btn" id="hide-values-btn" title="Ocultar valores"></button>
          <div class="avatar" id="avatar-btn">M</div>
        </div>
      </header>

      <main class="page-content" id="page-content"></main>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>
  <div class="modal-overlay" id="modal-overlay"></div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
