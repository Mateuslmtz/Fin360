<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fin360° — Organização Financeira</title>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <span class="brand-logo" id="brand-logo"></span>
          <span class="brand-text"><strong>Fin</strong>360<sup>°</sup></span>
        </div>
        <button class="collapse-btn" id="collapse-btn" title="Recolher menu">‹</button>
      </div>

      <div class="account-badge">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
        <span>Conta Pessoal</span>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-footer">
        <div class="sidebar-version">Fin360° · protótipo v0.1</div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" id="menu-btn" title="Menu"></button>
          <div>
            <h1 id="page-title">Dashboard</h1>
            <p id="page-subtitle">Visão geral</p>
          </div>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" id="theme-btn" title="Alternar tema"></button>
          <button class="icon-btn" id="hide-values-btn" title="Ocultar valores"></button>
          <div class="avatar" id="avatar-btn">M</div>
        </div>
      </header>

      <main class="page-content" id="page-content"></main>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>
  <div class="modal-overlay" id="modal-overlay"></div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
